<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>Sportssnap Live Stream</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif }
        .video-container {
            position: absolute;
            inset: 0;
            background: #000;
        }
        #player-wrap { position: relative; width: 100%; height: 100%; }
        #video { width: 100%; height: 100% }

        /* Persistent Overlays */
        .overlay {
            position: absolute;
            z-index: 9999;
            pointer-events: none;
            user-select: none;
        }
        .watermark {
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 19px;
            color: white;
            opacity: 0.9;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(0,0,0,0.95);
            font-weight: bold;
            white-space: nowrap;
        }

        /* Responsive Logo */
        .logo {
            top: 30px;
            right: 20px;
            width: 160px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: none;
            transition: all 0.3s ease;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .logo {
                width: 110px;
                height: 55px;
                top: 15px;
                right: 15px;
            }
            .watermark {
                font-size: 10px;
                bottom: 50px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                width: 95px;
                height: 48px;
            }
        }

        .shaka-spinner-container, .shaka-buffering-spinner, .shaka-spinner {
            display: none !important
        }

        #status {
            position: fixed;
            left: 12px;
            bottom: 12px;
            z-index: 10000;
            color: rgba(255, 255, 255, .9);
            background: rgba(0, 0, 0, .55);
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
        }
        #status:empty { display: none }
    </style>
</head>
<body>
    <div class="video-container">
        <div id="player-wrap" data-shaka-player-container>
            <video autoplay muted playsinline data-shaka-player id="video"></video>

            <!-- Overlays -->
            <div class="overlay watermark">sportssnap.net</div>
            <div class="overlay logo">
                <img src="https://i.ibb.co/BTM5dLF/sportssnap-logo.png" alt="SportsSnap Logo">
            </div>
        </div>
    </div>

    <div id="status"></div>

    <script>
        function showStatus(text) {
            const s = document.getElementById('status');
            if (s) s.textContent = text;
        }

        function onPlayerError(error) {
            const code = error && error.code ? error.code : 'UNKNOWN';
            console.error('Shaka error', error);
            showStatus('Stream failed (' + code + ')');
        }

        /*
         * applyProxy — prepend proxy to a URL if the stream JSON has a non-empty "proxy" field.
         *
         * JSON examples:
         *   "proxy": ""                          → no proxy, URL used as-is
         *   "proxy": "https://myproxy.com/?url=" → result: https://myproxy.com/?url=<encoded-url>
         *   "proxy": "https://myproxy.com/"      → result: https://myproxy.com/<url>  (raw append)
         *
         * The function auto-detects query-param style (proxy ends with "=") vs path style.
         */
        function applyProxy(url, proxy) {
            if (!proxy || proxy.trim() === '') return url;
            const p = proxy.trim();
            return p.endsWith('=') ? p + encodeURIComponent(url) : p + url;
        }

        async function loadStreamConfig() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('sportssnap') || 'default';
            try {
                showStatus('Loading stream list...');
                const res = await fetch('https://sportssnap.github.io/stream/l.json');
                if (!res.ok) throw new Error('Failed to fetch config');

                const config = await res.json();

                if (!config[key]) {
                    throw new Error('Stream "' + key + '" not found');
                }
                return config[key];
            } catch (e) {
                console.error(e);
                showStatus('Failed to load stream config');
                throw e;
            }
        }

        async function initPlayer() {
            if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) {
                showStatus('Browser not supported');
                return;
            }
            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            if (!video || !video.ui) {
                setTimeout(initPlayer, 80);
                return;
            }
            const ui = video.ui;
            const controls = ui.getControls();
            const player = controls.getPlayer();

            player.addEventListener('error', (ev) => onPlayerError(ev.detail));
            controls.addEventListener('error', (ev) => onPlayerError(ev.detail));

            ui.configure({
                controlPanelElements: [
                    "play_pause", "mute", "volume", "spacer",
                    "time_and_duration", "quality", "fullscreen",
                    "overflow_menu"
                ]
            });

            try {
                const streamData = await loadStreamConfig();

                let streamUrl, clearKeys = null;

                if (typeof streamData === 'string') {
                    // Plain string shorthand — no proxy support for this format
                    streamUrl = streamData;
                } else {
                    streamUrl = streamData.url || streamData.mpd || streamData.stream;
                    clearKeys = streamData.clearKeys || streamData.keys || null;

                    // ── PROXY ──────────────────────────────────────────────────────
                    // Read "proxy" field from the stream JSON entry.
                    // Leave "proxy" empty ("") or omit it entirely to skip proxying.
                    // Set it to your proxy URL to route the stream through it.
                    streamUrl = applyProxy(streamUrl, streamData.proxy || '');
                    // ──────────────────────────────────────────────────────────────
                }

                if (!streamUrl) throw new Error('No stream URL found');

                player.configure({
                    streaming: {
                        bufferingGoal: 20,
                        rebufferingGoal: 2,
                        bufferBehind: 20
                    },
                    drm: clearKeys ? { clearKeys: clearKeys } : {}
                });

                showStatus('Loading stream...');
                await player.load(streamUrl);
                showStatus('');
                video.muted = false;
                video.play().catch(() => {});
            } catch (e) {
                onPlayerError(e);
            }
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
        document.addEventListener('shaka-ui-load-failed', () => showStatus('Unable to load Shaka UI'));

        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => {});
        }

        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
            window.location.href = 'https://www.sportssnap.net';
        });

        document.addEventListener('keydown', function(event) {
            const blockedKeys = [
                { key: 'a', ctrl: true },
                { key: 'c', ctrl: true },
                { key: 'x', ctrl: true },
                { key: 'u', ctrl: true },
                { key: 's', ctrl: true },
                { key: 'p', ctrl: true },
                { key: 'i', ctrl: true, shift: true },
                { key: 'j', ctrl: true, shift: true },
                { key: 'k', ctrl: true, shift: true },
                { key: 'c', ctrl: true, shift: true }
            ];

            for (const combo of blockedKeys) {
                if (event.key.toLowerCase() === combo.key.toLowerCase() &&
                    (combo.ctrl && (event.ctrlKey || event.metaKey)) &&
                    (!combo.shift || event.shiftKey)) {
                    event.preventDefault();
                    window.location.href = 'https://www.sportssnap.net';
                    return;
                }
            }

            if (event.key === 'F12') {
                event.preventDefault();
                window.location.href = 'https://www.sportssnap.net';
            }
        });
    </script>
</body>
</html>
